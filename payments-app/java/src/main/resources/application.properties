server.port=${SERVER_PORT:8081}
server.shutdown=graceful

spring.application.name=payments-app

spring.main.allow-bean-definition-overriding=true
spring.config.import=file:${CONFIG_HOME:/vault/secrets}/database.properties
management.endpoints.web.exposure.include=refresh,health

payment.processor.url=${$PAYMENT_PROCESSOR_URL}
payment.processor.username={$PAYMENT_PROCESSOR_USERNAME}
payment.processor.password={$PAYMENT_PROCESSOR_PASSWORD}

spring.cloud.vault.uri=${VAULT_ADDR:http://127.0.0.1:8200}
spring.cloud.vault.token=${VAULT_TOKEN}
spring.cloud.vault.namespace=${VAULT_NAMESPACE:admin}